version: "3.9"

# ─── Networks ────────────────────────────────────────────────────────────────
networks:
  soc-network:
    driver: bridge
    name: secret-soc-network

# ─── Volumes ─────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    name: secret-soc-postgres-data

# ─── Services ────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: secret-soc-db
    restart: unless-stopped
    networks:
      - soc-network
    environment:
      POSTGRES_USER: ${PG_USER:-socadmin}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-socpassword}
      POSTGRES_DB: ${PG_DATABASE:-secrets_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${PG_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-socadmin} -d ${PG_DATABASE:-secrets_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Backend API ────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secret-soc-backend
    restart: unless-stopped
    networks:
      - soc-network
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5002
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: ${PG_USER:-socadmin}
      PG_PASSWORD: ${PG_PASSWORD:-socpassword}
      PG_DATABASE: ${PG_DATABASE:-secrets_db}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "5002:5002"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5002/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:5002}
    container_name: secret-soc-frontend
    restart: unless-stopped
    networks:
      - soc-network
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
